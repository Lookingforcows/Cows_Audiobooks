<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Looking for cows Audio</title>

  <link rel="icon" href="https://lookingforcows.com/favicon/favicon.ico" type="image/x-icon" />
  <link rel="icon" type="image/png" href="https://lookingforcows.com/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="https://lookingforcows.com/favicon/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="https://lookingforcows.com/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="https://lookingforcows.com/favicon/site.webmanifest" />
  <meta name="apple-mobile-web-app-title" content="Cow's Audiobooks" />

  <style>
    body {
      margin: 0;
      padding: 0;
      /* CHANGE YOUR BACKGROUND IMAGE URL HERE */
      background-image: url('/assets/IMG_0716.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      font-family: 'Open Dyslexic', sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
    }

    .container {
      max-width: 800px;
      width: 100%;
      margin: 20px auto;
      padding: 20px;
      background-color: rgba(0, 0, 0, 0.8);
      text-align: center;
      padding-bottom: 120px;
      z-index: 10;
    }

    .episode-list {
      display: flex;
      overflow-x: auto;
      gap: 20px;
      margin-top: 20px;
      padding-bottom: 20px;
      scroll-snap-type: x mandatory;
    }

    .episode {
      background-color: rgba(0, 0, 0, 0.7);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      width: 250px;
      flex-shrink: 0;
      box-sizing: border-box;
      scroll-snap-align: start;
    }

    .episode img {
      width: 200px;
      height: auto;
      border-radius: 5px;
    }

    .episode h3 {
      margin-top: 10px;
      font-size: 18px;
    }

    .episode p {
      font-size: 14px;
      margin-top: 10px;
      /* Added a max height and scroll for super long descriptions */
      max-height: 100px; 
      overflow-y: auto;
    }

    .episode audio {
      width: 100%;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: black;
      width: 100%;
      position: relative;
      margin-top: auto; /* Pushes footer to the bottom */
    }

    .thumbnail-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 110;
    }

    .thumbnail-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
    }

    .thumbnail {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border: 2px solid #ddd;
      transition: transform 0.3s ease;
    }

    .thumbnail-btn:hover .thumbnail,
    .thumbnail-btn:focus .thumbnail {
      transform: scale(1.05);
      border-color: #00aaff;
    }

    .fullscreen-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      z-index: 200;
      display: none;
    }

    .fullscreen-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 201;
      display: none;
    }

    .fullscreen-iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .close-button {
      position: absolute;
      top: 20px;
      right: 20px;
      background-color: red;
      color: white;
      font-size: 20px;
      padding: 10px 15px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      z-index: 202;
    }

    .filter-buttons {
      margin-top: 20px;
    }

    .filter-buttons button {
      background-color: #444;
      color: white;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
      border-radius: 5px;
      font-size: 16px;
    }

    .filter-buttons button:hover {
      background-color: #666;
    }

    .filter-buttons button.active {
      background-color: #00aaff;
    }
  </style>
</head>
<body>

  <div class="thumbnail-container">
    <button class="thumbnail-btn" onclick="openFullscreen('https://lookingforcows.com/Social')" aria-label="Social links">
      <img src="/assets/social.jpg" class="thumbnail" alt="">
    </button>
    <button class="thumbnail-btn" onclick="openFullscreen('https://lookingforcows.com/About')" aria-label="About me">
      <img src="/assets/about.jpg" class="thumbnail" alt="">
    </button>
  </div>

  <div id="fullscreenOverlay" class="fullscreen-overlay"></div>
  <div id="fullscreenContainer" class="fullscreen-container">
    <button class="close-button" onclick="closeFullscreen()">X</button>
    <iframe id="fullscreenIframe" class="fullscreen-iframe" src=""></iframe>
  </div>

  <div class="container">
    <h1>There are no cup cakes.</h1>
    <p>Listen below. Enjoy! Scroll ➡️</p>

    <div class="filter-buttons">
      <button id="audiobookBtn" class="active" onclick="setFilter('audiobook')">Full Audiobooks</button>
      <button id="poetryBtn" onclick="setFilter('poetry')">Poetry</button>
    </div>

    <div class="episode-list" id="episode-list">
      </div>
    <p>To download, right-click and "save as".</p>
  </div>

  <footer>
    <p>© 2026 Looking for cows Audio</p>
    <p>All Rights Reserved.</p>
  </footer>

  <script>
    // --- Fullscreen Iframe Logic ---
    function openFullscreen(url) {
      document.getElementById('fullscreenIframe').src = url;
      document.getElementById('fullscreenOverlay').style.display = 'block';
      document.getElementById('fullscreenContainer').style.display = 'block';
      document.body.style.overflow = 'hidden';
    }

    function closeFullscreen() {
      document.getElementById('fullscreenOverlay').style.display = 'none';
      document.getElementById('fullscreenContainer').style.display = 'none';
      document.getElementById('fullscreenIframe').src = '';
      document.body.style.overflow = 'auto';
    }

    // --- Podcast Fetching and Filtering Logic ---
    let allEpisodes = []; // This stores the RSS data so we only fetch it once
    let currentFilter = 'audiobook';

    function setFilter(filter) {
      currentFilter = filter;
      document.getElementById('audiobookBtn').classList.remove('active');
      document.getElementById('poetryBtn').classList.remove('active');
      document.getElementById(filter + 'Btn').classList.add('active');
      
      // Instead of fetching the URL again, we just re-sort the saved array
      renderEpisodes(filter);
    }

    function renderEpisodes(filter) {
      const episodeList = document.getElementById('episode-list');
      episodeList.innerHTML = ''; // Clear the current view

      // Filter our saved array based on the button clicked
      const filteredEpisodes = allEpisodes.filter(ep => {
        if (filter === 'audiobook') return ep.isAudiobook;
        if (filter === 'poetry') return ep.isPoetry;
        return false;
      });

      if (filteredEpisodes.length === 0) {
        episodeList.innerHTML = '<p>No episodes found for this category.</p>';
        return;
      }

      // Build the HTML for the filtered episodes
      filteredEpisodes.forEach(ep => {
        const episodeElement = document.createElement('div');
        episodeElement.classList.add('episode');

        episodeElement.innerHTML = `
          <img src="${ep.coverImage}" alt="${ep.title}">
          <h3>${ep.title}</h3>
          <p>${ep.description}</p>
          <audio controls preload="none">
            <source src="${ep.link}" type="audio/mp3">
            Your browser does not support the audio element.
          </audio>
        `;
        episodeList.appendChild(episodeElement);
      });
    }

    async function fetchPodcastEpisodes() {
      const rssUrl = 'https://anchor.fm/s/e586064c/podcast/rss';
      const episodeList = document.getElementById('episode-list');
      episodeList.innerHTML = '<p>Loading episodes...</p>';

      try {
        const response = await fetch(rssUrl);
        if (!response.ok) throw new Error("Failed to fetch RSS feed");

        const xml = await response.text();
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xml, 'application/xml');
        const items = xmlDoc.getElementsByTagName('item');

        // Parse the XML and save it into our allEpisodes array
        for (let i = 0; i < items.length; i++) {
          const title = items[i].getElementsByTagName('title')[0]?.textContent || 'Untitled';
          const description = items[i].getElementsByTagName('description')[0]?.textContent || '';
          const link = items[i].getElementsByTagName('enclosure')[0]?.getAttribute('url') || '';
          const coverImage = items[i].getElementsByTagName('itunes:image')[0]?.getAttribute('href') || '';

          const isAudiobook = title.toLowerCase().includes("full audiobook") || description.toLowerCase().includes("full audiobook");
          const isPoetry = title.toLowerCase().includes("poetry") || description.toLowerCase().includes("poetry");

          allEpisodes.push({
            title,
            description,
            link,
            coverImage,
            isAudiobook,
            isPoetry
          });
        }

        // Display the default category once the data is loaded
        renderEpisodes(currentFilter);

      } catch (error) {
        console.error("Error fetching RSS feed:", error);
        episodeList.innerHTML = '<p>Error loading episodes.</p>';
      }
    }

    // Fetch the RSS feed ONE time when the page loads
    window.onload = fetchPodcastEpisodes;
  </script>
</body>
</html>
